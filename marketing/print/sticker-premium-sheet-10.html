<title>プレミアム特典 訂正シール 10面 (エーワン72210対応)</title>
<style>
  @page { size: A4 portrait; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #e2e8f0; padding: 20px; font-family: -apple-system, "Hiragino Sans", sans-serif; }
  .print-guide {
    max-width: 210mm; margin: 0 auto 20px;
    padding: 12px 16px; background: #ecfdf5;
    border-left: 4px solid #059669; font-size: 13px; color: #047857;
  }
  @media print {
    body { background: white; padding: 0; }
    .print-guide { display: none; }
    .page { box-shadow: none; margin: 0 auto; }
  }
  .page {
    width: 210mm; height: 296.5mm;
    margin: 0 auto;
    background: white; position: relative;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    overflow: hidden;
  }
</style>

<body>
<div class="print-guide">
  📄 <strong>印刷方法</strong>: 市販の「A4 10面ラベル」(エーワン 72210 / 86.4×50.8mm) をセット
  → ⌘P → A4 / 余白なし / 倍率100% / 背景グラフィック ON。
  印刷済みチラシの「プレミアムプラン」欄 (8cm×4.9cm) の上に貼って隠す訂正シールです。
</div>
